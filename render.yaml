# Render blueprint — deploy PolicyLens with no credit card.
# 1. Push this repo to GitHub.
# 2. On https://dashboard.render.com → New → Blueprint → pick the repo.
# 3. Add the NIM_API_KEY value when prompted (marked sync:false below).
services:
  - type: web
    name: policylens
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Single worker + threads: the per-session corpus store lives in process
    # memory, so all of a user's requests must share one process. Threads give
    # concurrency for the I/O-bound model calls.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --worker-class gthread --timeout 60
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: NIM_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
